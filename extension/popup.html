<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="logo-mark" aria-hidden="true"></div>
    <div>
      <h1>ISHI CUE</h1>
      <p class="tagline">Vision Assist &middot; every site, your eyes</p>
    </div>
    <label class="switch" title="Master toggle">
      <span class="switch-state" id="switch-state">Off</span>
      <input type="checkbox" id="enabled" />
      <span class="track"><span class="thumb"></span></span>
    </label>
  </header>

  <section>
    <p class="label">Vision Type</p>
    <div class="type-grid" id="types">
      <button data-type="deuteranopia">Deuteranopia<span>red-green &middot; most common</span></button>
      <button data-type="protanopia">Protanopia<span>red-green &middot; red-blind</span></button>
      <button data-type="tritanopia">Tritanopia<span>blue-yellow</span></button>
      <button data-type="achromatopsia">Achromatopsia<span>monochromacy</span></button>
    </div>
  </section>

  <section>
    <div class="slider-row">
      <p class="label">Severity</p>
      <span class="value" id="severity-value">100%</span>
    </div>
    <input type="range" id="severity" min="0.05" max="1" step="0.01" />
  </section>

  <section>
    <div class="slider-row">
      <p class="label">Strength</p>
      <span class="value" id="strength-value">80%</span>
    </div>
    <input type="range" id="strength" min="0" max="1.5" step="0.05" />
  </section>

  <section>
    <label class="host-row">
      <input type="checkbox" id="host-disabled" />
      <span id="host-label">Disable on this site</span>
    </label>
  </section>

  <footer>
    Calibrate your exact profile in the ISHI CUE app, then match the values here.
  </footer>

  <script src="popup.js"></script>
</body>
</html>
